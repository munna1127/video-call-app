<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Call App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Glass Card */
.container {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.05);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* Title */
h1 {
    margin-bottom: 20px;
    font-size: 28px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    font-size: 16px;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

/* Join */
.join {
    background: #3b82f6;
}

.join:hover {
    background: #2563eb;
}

/* Create */
.create {
    background: #22c55e;
}

.create:hover {
    background: #16a34a;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

    <h1>🚀 Video Call</h1>

    <input id="roomInput" placeholder="Enter Room ID">

    <button class="join" onclick="joinRoom()">Join Room</button>
    <button class="create" onclick="createRoom()">Create New Room</button>

    <div class="footer">
        Built with WebRTC ⚡
    </div>

</div>

<script>

// 🎯 Join existing room
function joinRoom() {
    const room = document.getElementById("roomInput").value.trim();

    if (!room) {
        alert("Enter Room ID");
        return;
    }

    window.location.href = `room.html?room=${room}`;
}

// 🚀 Create new room
function createRoom() {
    const room = generateRoomId();
    window.location.href = `room.html?room=${room}`;
}

// 🔑 Random Room Generator
function generateRoomId() {
    return Math.random().toString(36).substring(2, 8);
}

</script>

</body>
</html>
