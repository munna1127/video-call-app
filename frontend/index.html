<!DOCTYPE html>
<html>
<head>
  <title>Video Call</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
    }
    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🚀 Video Call</h2>

  <button onclick="createRoom()">Create Room</button>

  <br><br>

  <input id="roomInput" placeholder="Enter Room ID">
  <button onclick="joinRoom()">Join Room</button>
</div>

<script>
function createRoom() {
  const roomId = Math.random().toString(36).substring(2, 8);
  const link = `${window.location.origin}/room.html?room=${roomId}`;

  navigator.clipboard.writeText(link);
  alert("Link copied 🔥");

  window.location.href = link;
}

function joinRoom() {
  const roomId = document.getElementById("roomInput").value;
  if (!roomId) return alert("Enter Room ID");

  window.location.href = `/room.html?room=${roomId}`;
}
</script>

</body>
</html>
