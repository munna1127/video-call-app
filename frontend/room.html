<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Room</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #020617;
    color: white;
    overflow: hidden;
}

/* Top bar */
.top-bar {
    width: 100%;
    padding: 10px;
    text-align: center;
    background: #0f172a;
    font-size: 14px;
}

/* Layout */
.main {
    display: flex;
    height: calc(100vh - 50px);
}

/* Video area */
.video-section {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 10px;
}

/* Video style */
video {
    width: 45%;
    max-height: 45%;
    border-radius: 12px;
    background: black;
}

/* Chat */
.chat {
    width: 250px;
    background: #0f172a;
    display: flex;
    flex-direction: column;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.chat-box div {
    margin-bottom: 8px;
    font-size: 13px;
}

/* Input */
.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
}

.chat-input button {
    padding: 10px;
    border: none;
    background: #3b82f6;
    color: white;
}

/* Controls */
.controls {
    position: fixed;
    bottom: 15px;
    width: 100%;
    text-align: center;
}

.controls button {
    padding: 12px;
    margin: 5px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

/* Button colors */
.mic { background: #22c55e; }
.cam { background: #3b82f6; }
.screen { background: #a855f7; }
.copy { background: #f59e0b; }
.end { background: #ef4444; }

</style>
</head>

<body>

<div class="top-bar">
    Room ID: <span id="roomId"></span>
</div>

<div class="main">

    <!-- Video Area -->
    <div class="video-section" id="videoContainer">
        <video id="localVideo" autoplay muted></video>
    </div>

    <!-- Chat -->
    <div class="chat">
        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input">
            <input id="msgInput" placeholder="Type message...">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

</div>

<!-- Controls -->
<div class="controls">
    <button class="mic" onclick="toggleMic()">🎤</button>
    <button class="cam" onclick="toggleCam()">📷</button>
    <button class="screen" onclick="shareScreen()">🖥️</button>
    <button class="copy" onclick="copyRoom()">📋</button>
    <button class="end" onclick="leaveCall()">❌</button>
</div>

<!-- Scripts -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="app.js"></script>

</body>
</html>
